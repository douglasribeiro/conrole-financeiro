server:
  port: 8081
spring:
  profiles:
    active: dev
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/meu-realm
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  main:
    allow-bean-definition-overriding: true
  application:
    name: contas
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3308/contas_db
    username: docker
    password: admin123
  jpa:
    hibernate: 
      ddl-auto: update
    properties:
      hibernate:
    show-sql: true
    open-in-view: false

