# docker-compose -f docker-compose-db.yml up -d

services:
  contas-db:
    image: mysql:9.3.0
    restart: always
    environment:
      TZ: America/Sao_Paulo
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_USER: docker
      MYSQL_PASSWORD: admin123
      MYSQL_DATABASE: contas_db
    ports:
      - 3308:3306
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - contas-network

networks:
  contas-network:
    name: contas-network
    driver: bridge